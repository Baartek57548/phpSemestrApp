services:
  apache:
    build: apache
    ports:
      - "8095:80"
      - "8099:80"
    # Usunąłem "links", ponieważ to przestarzała dyrektywa. 
    # Docker domyślnie pozwala na komunikację po nazwie serwisu.
    depends_on:
      - php_8_4
      - database
    volumes:
      - ./projects:/var/www
      - ./apache/conf:/usr/local/apache2/conf/overwrite
    working_dir: "/var/www"

  php_8_4:
    build: php_8_4
    volumes:
      - ./php/php.ini:/usr/local/etc/php/conf.d/php-override.ini
      - ./projects:/var/www
    working_dir: /var/www

  # Dodano bazę danych, która jest kluczowa w nauce Symfony (Doctrine ORM)
  database:
    image: mariadb:10.11 # MariaDB jest lekka i świetna do środowisk deweloperskich
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony_db
      MYSQL_USER: symfony_user
      MYSQL_PASSWORD: symfony_password
    volumes:
      - db_data:/var/lib/mysql

# Wolumen do zachowania danych z bazy po restarcie kontenerów
volumes:
  db_data: