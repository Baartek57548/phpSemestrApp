<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Crypto Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Panel Inwestora</h1>
        
        <div class="controls">
            <div class="calc">
                <input type="number" id="pln-input" placeholder="Kwota PLN">
                <span id="btc-result">0.00 BTC</span>
            </div>
            <div class="sort">
                <button id="sort-asc">Cena Rosnąco</button>
                <button id="sort-desc">Cena Malejąco</button>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="cryptoChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Logo</th>
                    <th>Nazwa</th>
                    <th>Cena (USD)</th>
                    <th>Zmiana 24h</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>
</html>
