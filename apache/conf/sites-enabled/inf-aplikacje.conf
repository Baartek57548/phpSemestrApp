<VirtualHost *:80>
    ServerName inf.local

    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/inf-backend/public

    <Directory /var/www/inf-backend/public>
        DirectoryIndex index.php
        AllowOverride All

        Require all granted

        <IfModule mod_rewrite.c>
            Options -MultiViews
            RewriteEngine On

            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule .? - [L]

            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ /index.php [QSA,L]
        </IfModule>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/eti_error_docker.log
    CustomLog ${APACHE_LOG_DIR}/eti_access_docker.log combined

    <Proxy "fcgi://php_8_4:9000">
        ProxySet timeout=300
    </Proxy>
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php_8_4:9000"
    </FilesMatch>
</VirtualHost>

